name: Release Gate

# Trigger after CI succeeds on main to avoid duplicating lint/check-types/build/test.
# Also supports manual dispatch for re-runs.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    # Only run when CI passed (or manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Enforce main updates via PRs
        if: github.actor != 'github-actions[bot]'
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });
            if (!pulls.data.length) {
              core.setFailed(
                `Commit ${sha} is not associated with a pull request. Push to main should come from a merged PR.`
              );
              return;
            }
            core.notice(`Found ${pulls.data.length} PR association(s) for ${sha}.`);

      # CI already ran lint, check-types, build, and full tests.
      # Release gate only runs the targeted core API tests as an extra safety net.
      - name: Setup Node & Bun
        uses: ./.github/actions/setup-node-bun
        with:
          node-version: '22'
          bun-version: '1.3.8'

      - name: Core API tests
        run: >
          cd apps/api && bun run test --
          src/server.int.test.ts
          src/lib/tests/idempotency.int.test.ts
          src/lib/cron/runtime.unit.test.ts
          src/plugins/tests/import-instrumentation.unit.test.ts
          src/modules/billing/routes.unit.test.ts
          src/plugins/tests/api-key-auth.unit.test.ts
          src/modules/quotes/services/confidence.unit.test.ts
