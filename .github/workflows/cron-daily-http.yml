name: Cron (Daily — HTTP)

on:
  schedule:
    - cron: '7 3 * * *' # daily 03:07 UTC
  workflow_dispatch: {}

concurrency:
  group: cron-daily-http
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLEARCOST_INTERNAL_API_URL: ${{ secrets.CLEARCOST_INTERNAL_API_URL }}
      CLEARCOST_TASKS_API_KEY: ${{ secrets.CLEARCOST_TASKS_API_KEY }}
      INTERNAL_SIGNING_SECRET: ${{ secrets.INTERNAL_SIGNING_SECRET }}
      BN_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.BN_MFN_OFFICIAL_EXCEL_URL || '' }}
      BN_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.BN_FTA_OFFICIAL_EXCEL_URL || '' }}
      BD_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.BD_MFN_OFFICIAL_EXCEL_URL || '' }}
      BD_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.BD_FTA_OFFICIAL_EXCEL_URL || '' }}
      AR_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.AR_MFN_OFFICIAL_EXCEL_URL || '' }}
      AR_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.AR_FTA_OFFICIAL_EXCEL_URL || '' }}
      BR_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.BR_MFN_OFFICIAL_EXCEL_URL || '' }}
      BR_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.BR_FTA_OFFICIAL_EXCEL_URL || '' }}
      AU_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.AU_MFN_OFFICIAL_EXCEL_URL || '' }}
      AU_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.AU_FTA_OFFICIAL_EXCEL_URL || '' }}
      NZ_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.NZ_MFN_OFFICIAL_EXCEL_URL || '' }}
      NZ_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.NZ_FTA_OFFICIAL_EXCEL_URL || '' }}
      CA_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.CA_MFN_OFFICIAL_EXCEL_URL || '' }}
      CA_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.CA_FTA_OFFICIAL_EXCEL_URL || '' }}
      MX_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.MX_MFN_OFFICIAL_EXCEL_URL || '' }}
      MX_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.MX_FTA_OFFICIAL_EXCEL_URL || '' }}
      CH_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.CH_MFN_OFFICIAL_EXCEL_URL || '' }}
      CH_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.CH_FTA_OFFICIAL_EXCEL_URL || '' }}
      CO_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.CO_MFN_OFFICIAL_EXCEL_URL || '' }}
      CO_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.CO_FTA_OFFICIAL_EXCEL_URL || '' }}
      KE_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.KE_MFN_OFFICIAL_EXCEL_URL || '' }}
      KE_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.KE_FTA_OFFICIAL_EXCEL_URL || '' }}
      NO_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.NO_MFN_OFFICIAL_EXCEL_URL || '' }}
      NO_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.NO_FTA_OFFICIAL_EXCEL_URL || '' }}
      IS_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.IS_MFN_OFFICIAL_EXCEL_URL || '' }}
      IS_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.IS_FTA_OFFICIAL_EXCEL_URL || '' }}
      IN_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.IN_MFN_OFFICIAL_EXCEL_URL || '' }}
      IN_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.IN_FTA_OFFICIAL_EXCEL_URL || '' }}
      IL_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.IL_MFN_OFFICIAL_EXCEL_URL || '' }}
      IL_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.IL_FTA_OFFICIAL_EXCEL_URL || '' }}
      EG_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.EG_MFN_OFFICIAL_EXCEL_URL || '' }}
      EG_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.EG_FTA_OFFICIAL_EXCEL_URL || '' }}
      GH_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.GH_MFN_OFFICIAL_EXCEL_URL || '' }}
      GH_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.GH_FTA_OFFICIAL_EXCEL_URL || '' }}
      RU_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.RU_MFN_OFFICIAL_EXCEL_URL || '' }}
      RU_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.RU_FTA_OFFICIAL_EXCEL_URL || '' }}
      NG_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.NG_MFN_OFFICIAL_EXCEL_URL || '' }}
      NG_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.NG_FTA_OFFICIAL_EXCEL_URL || '' }}
      UA_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.UA_MFN_OFFICIAL_EXCEL_URL || '' }}
      UA_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.UA_FTA_OFFICIAL_EXCEL_URL || '' }}
      LI_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.LI_MFN_OFFICIAL_EXCEL_URL || '' }}
      LI_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.LI_FTA_OFFICIAL_EXCEL_URL || '' }}
      CL_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.CL_MFN_OFFICIAL_EXCEL_URL || '' }}
      CL_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.CL_FTA_OFFICIAL_EXCEL_URL || '' }}
      PE_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.PE_MFN_OFFICIAL_EXCEL_URL || '' }}
      PE_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.PE_FTA_OFFICIAL_EXCEL_URL || '' }}
      PK_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.PK_MFN_OFFICIAL_EXCEL_URL || '' }}
      PK_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.PK_FTA_OFFICIAL_EXCEL_URL || '' }}
      SA_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.SA_MFN_OFFICIAL_EXCEL_URL || '' }}
      SA_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.SA_FTA_OFFICIAL_EXCEL_URL || '' }}
      TR_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.TR_MFN_OFFICIAL_EXCEL_URL || '' }}
      TR_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.TR_FTA_OFFICIAL_EXCEL_URL || '' }}
      TW_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.TW_MFN_OFFICIAL_EXCEL_URL || '' }}
      TW_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.TW_FTA_OFFICIAL_EXCEL_URL || '' }}
      ZA_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.ZA_MFN_OFFICIAL_EXCEL_URL || '' }}
      ZA_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.ZA_FTA_OFFICIAL_EXCEL_URL || '' }}
      ID_BTKI_XLSX_URL: ${{ secrets.ID_BTKI_XLSX_URL || '' }}
      ID_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.ID_FTA_OFFICIAL_EXCEL_URL || '' }}
      KH_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.KH_MFN_OFFICIAL_EXCEL_URL || '' }}
      KH_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.KH_FTA_OFFICIAL_EXCEL_URL || '' }}
      LA_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.LA_MFN_OFFICIAL_EXCEL_URL || '' }}
      LA_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.LA_FTA_OFFICIAL_EXCEL_URL || '' }}
      MM_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.MM_MFN_OFFICIAL_EXCEL_URL || '' }}
      MM_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.MM_FTA_OFFICIAL_EXCEL_URL || '' }}
      MY_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.MY_MFN_OFFICIAL_EXCEL_URL || '' }}
      MY_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.MY_FTA_OFFICIAL_EXCEL_URL || '' }}
      PH_TARIFF_EXCEL_URL: ${{ secrets.PH_TARIFF_EXCEL_URL || '' }}
      PH_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.PH_FTA_OFFICIAL_EXCEL_URL || '' }}
      TH_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.TH_MFN_OFFICIAL_EXCEL_URL || '' }}
      TH_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.TH_FTA_OFFICIAL_EXCEL_URL || '' }}
      VN_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.VN_MFN_OFFICIAL_EXCEL_URL || '' }}
      VN_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.VN_FTA_OFFICIAL_EXCEL_URL || '' }}
      SG_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.SG_MFN_OFFICIAL_EXCEL_URL || '' }}
      SG_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.SG_FTA_OFFICIAL_EXCEL_URL || '' }}
      KR_MFN_OFFICIAL_EXCEL_URL: ${{ secrets.KR_MFN_OFFICIAL_EXCEL_URL || '' }}
      KR_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.KR_FTA_OFFICIAL_EXCEL_URL || '' }}
      CN_MFN_PDF_URL: ${{ secrets.CN_MFN_PDF_URL || '' }}
      CN_FTA_OFFICIAL_EXCEL_URL: ${{ secrets.CN_FTA_OFFICIAL_EXCEL_URL || '' }}
      JP_TARIFF_INDEX: ${{ secrets.JP_TARIFF_INDEX || '' }}
      UK_10_DATA_API_BASE: ${{ secrets.UK_10_DATA_API_BASE || '' }}
      HTS_API_BASE: ${{ secrets.HTS_API_BASE || '' }}
      HTS_CSV_URL: ${{ secrets.HTS_CSV_URL || '' }}
      EU_TARIC_DAILY_LIST: ${{ secrets.EU_TARIC_DAILY_LIST || '' }}
      UK_REMEDY_MEASURE_TYPES: ${{ vars.UK_REMEDY_MEASURE_TYPES || '552,551,695' }}
      EU_TARIC_REMEDY_TYPES: ${{ vars.EU_TARIC_REMEDY_TYPES || '' }}
      PRUNE_DAYS: ${{ vars.IMPORTS_PRUNE_DAYS || 90 }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Validate internal envs
        run: bun run internal-request -- --validate

      - name: Preflight source registry alignment
        working-directory: apps/api
        run: |
          bun run src/lib/run-cron.ts import:sources:bootstrap
          bun run src/lib/run-cron.ts report:source-registry

      # ── FX ──────────────────────────────────────────────────────────────
      - name: FX daily (ECB)
        run: |
          OUT=$(bun run internal-request -- --path /internal/cron/fx/daily --body '{}')
          echo "$OUT" | jq .
          FX_AS_OF=$(echo "$OUT" | jq -r '.fxAsOf // empty')
          if [ -z "$FX_AS_OF" ]; then
            echo "[fx:daily] missing fxAsOf in response"
            exit 1
          fi

      # ── VAT ─────────────────────────────────────────────────────────────
      - name: VAT (OECD/IMF auto)
        run: .github/scripts/cron-import-step.sh "vat:auto" /internal/cron/import/vat/auto '{}'

      # ── EU Duties ───────────────────────────────────────────────────────
      - name: EU Duties (TARIC — daily)
        run: .github/scripts/cron-import-step.sh "duties:eu-daily" /internal/cron/import/duties/eu/daily --env EU_TARIC_DAILY_LIST --body-key dailyListUrl

      # ── JP Duties ───────────────────────────────────────────────────────
      - name: JP Duties — MFN (Customs)
        run: .github/scripts/cron-import-step.sh "duties:jp-mfn" /internal/cron/import/duties/jp-mfn --env JP_TARIFF_INDEX --body-key tariffIndexUrl

      - name: JP Duties — FTA (strict official default)
        run: .github/scripts/cron-import-step.sh "duties:jp-fta" /internal/cron/import/duties/jp-fta --env JP_TARIFF_INDEX --body-key tariffIndexUrl

      # ── KR Duties ───────────────────────────────────────────────────────
      - name: KR Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:kr-mfn" /internal/cron/import/duties/kr-mfn/official/excel --env KR_MFN_OFFICIAL_EXCEL_URL

      - name: KR Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:kr-fta" /internal/cron/import/duties/kr-fta/official/excel --env KR_FTA_OFFICIAL_EXCEL_URL

      # ── UK Duties ───────────────────────────────────────────────────────
      - name: UK Duties — MFN
        run: .github/scripts/cron-import-step.sh "duties:uk-mfn" /internal/cron/import/duties/uk-mfn --env UK_10_DATA_API_BASE --body-key apiBaseUrl

      - name: UK Duties — FTA
        run: .github/scripts/cron-import-step.sh "duties:uk-fta" /internal/cron/import/duties/uk-fta --env UK_10_DATA_API_BASE --body-key apiBaseUrl

      # ── ID Duties ───────────────────────────────────────────────────────
      - name: ID Duties — MFN (official)
        run: .github/scripts/cron-import-step.sh "duties:id-mfn" /internal/cron/import/duties/id-mfn --env ID_BTKI_XLSX_URL

      - name: ID Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:id-fta" /internal/cron/import/duties/id-fta/official/excel --env ID_FTA_OFFICIAL_EXCEL_URL

      # ── MY Duties ───────────────────────────────────────────────────────
      - name: MY Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:my-mfn" /internal/cron/import/duties/my-mfn/official/excel --env MY_MFN_OFFICIAL_EXCEL_URL

      - name: MY Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:my-fta" /internal/cron/import/duties/my-fta/official/excel --env MY_FTA_OFFICIAL_EXCEL_URL

      # ── PH Duties ───────────────────────────────────────────────────────
      - name: PH Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:ph-mfn" /internal/cron/import/duties/ph-mfn --env PH_TARIFF_EXCEL_URL

      - name: PH Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:ph-fta" /internal/cron/import/duties/ph-fta/official/excel --env PH_FTA_OFFICIAL_EXCEL_URL

      # ── CN Duties ───────────────────────────────────────────────────────
      - name: CN Duties — MFN (official PDF)
        run: .github/scripts/cron-import-step.sh "duties:cn-mfn" /internal/cron/import/duties/cn-mfn/official/pdf --env CN_MFN_PDF_URL

      - name: CN Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:cn-fta" /internal/cron/import/duties/cn-fta/official/excel --env CN_FTA_OFFICIAL_EXCEL_URL

      # ── TH Duties ───────────────────────────────────────────────────────
      - name: TH Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:th-mfn" /internal/cron/import/duties/th-mfn/official/excel --env TH_MFN_OFFICIAL_EXCEL_URL

      - name: TH Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:th-fta" /internal/cron/import/duties/th-fta/official/excel --env TH_FTA_OFFICIAL_EXCEL_URL

      # ── VN Duties ───────────────────────────────────────────────────────
      - name: VN Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:vn-mfn" /internal/cron/import/duties/vn-mfn/official/excel --env VN_MFN_OFFICIAL_EXCEL_URL

      - name: VN Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:vn-fta" /internal/cron/import/duties/vn-fta/official/excel --env VN_FTA_OFFICIAL_EXCEL_URL

      # ── SG Duties ───────────────────────────────────────────────────────
      - name: SG Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:sg-mfn" /internal/cron/import/duties/sg-mfn/official/excel --env SG_MFN_OFFICIAL_EXCEL_URL

      - name: SG Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:sg-fta" /internal/cron/import/duties/sg-fta/official/excel --env SG_FTA_OFFICIAL_EXCEL_URL

      # ── BN Duties ───────────────────────────────────────────────────────
      - name: BN Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:bn-mfn" /internal/cron/import/duties/bn-mfn/official/excel --env BN_MFN_OFFICIAL_EXCEL_URL

      - name: BN Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:bn-fta" /internal/cron/import/duties/bn-fta/official/excel --env BN_FTA_OFFICIAL_EXCEL_URL

      # ── KH Duties ───────────────────────────────────────────────────────
      - name: KH Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:kh-mfn" /internal/cron/import/duties/kh-mfn/official/excel --env KH_MFN_OFFICIAL_EXCEL_URL

      - name: KH Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:kh-fta" /internal/cron/import/duties/kh-fta/official/excel --env KH_FTA_OFFICIAL_EXCEL_URL

      # ── LA Duties ───────────────────────────────────────────────────────
      - name: LA Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:la-mfn" /internal/cron/import/duties/la-mfn/official/excel --env LA_MFN_OFFICIAL_EXCEL_URL

      - name: LA Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:la-fta" /internal/cron/import/duties/la-fta/official/excel --env LA_FTA_OFFICIAL_EXCEL_URL

      # ── MM Duties ───────────────────────────────────────────────────────
      - name: MM Duties — MFN (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:mm-mfn" /internal/cron/import/duties/mm-mfn/official/excel --env MM_MFN_OFFICIAL_EXCEL_URL

      - name: MM Duties — FTA (official Excel)
        run: .github/scripts/cron-import-step.sh "duties:mm-fta" /internal/cron/import/duties/mm-fta/official/excel --env MM_FTA_OFFICIAL_EXCEL_URL

      # ── Country official (catch-all) ────────────────────────────────────
      - name: Country Duties — enabled official imports (optional)
        working-directory: apps/api
        run: |
          bun run src/lib/run-cron.ts import:duties:country-official-enabled-all

      # ── US Duties (special — multi-key body) ────────────────────────────
      - name: US Duties — MFN (HTS)
        run: |
          if [ -z "${HTS_API_BASE:-}" ]; then
            echo "[duties:us-mfn-official] missing HTS_API_BASE"
            exit 1
          fi
          BODY=$(jq -n --arg baseUrl "$HTS_API_BASE" --arg csvUrl "$HTS_CSV_URL" '{baseUrl: $baseUrl} + (if $csvUrl != "" then {csvUrl: $csvUrl} else {} end)')
          OUT=$(bun run internal-request -- --path /internal/cron/import/duties/us-mfn --body "$BODY")
          echo "$OUT" | jq .
          ROWS=$(echo "$OUT" | jq -r '([.count,.inserted,.updated] | map(select(type=="number")) | add) // 0')
          if [ "$ROWS" -lt 1 ]; then
            echo "[duties:us-mfn-official] expected >0 imported rows, got $ROWS"
            exit 1
          fi

      - name: US Duties — FTA (HTS)
        run: |
          if [ -z "${HTS_API_BASE:-}" ]; then
            echo "[duties:us-fta-official] missing HTS_API_BASE"
            exit 1
          fi
          BODY=$(jq -n --arg baseUrl "$HTS_API_BASE" --arg csvUrl "$HTS_CSV_URL" '{baseUrl: $baseUrl} + (if $csvUrl != "" then {csvUrl: $csvUrl} else {} end)')
          OUT=$(bun run internal-request -- --path /internal/cron/import/duties/us-preferential --body "$BODY")
          echo "$OUT" | jq .
          ROWS=$(echo "$OUT" | jq -r '([.count,.inserted,.updated] | map(select(type=="number")) | add) // 0')
          if [ "$ROWS" -lt 1 ]; then
            echo "[duties:us-fta-official] expected >0 imported rows, got $ROWS"
            exit 1
          fi

      # ── Surcharges ──────────────────────────────────────────────────────
      - name: UK Surcharges — remedies
        run: |
          BODY=$(jq -n --arg s "$UK_REMEDY_MEASURE_TYPES" '{measureTypeIds: ($s | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0)))}')
          OUT=$(bun run internal-request -- --path /internal/cron/import/surcharges/uk-remedies --body "$BODY")
          echo "$OUT" | jq .
          ROWS=$(echo "$OUT" | jq -r '([.count,.inserted,.updated] | map(select(type=="number")) | add) // 0')
          if [ "$ROWS" -lt 1 ]; then
            echo "[surcharges:uk-remedies] expected >0 imported rows, got $ROWS"
            exit 1
          fi

      - name: EU Surcharges — remedies (when configured)
        if: ${{ env.EU_TARIC_REMEDY_TYPES != '' }}
        run: |
          BODY=$(jq -n --arg s "$EU_TARIC_REMEDY_TYPES" '{measureTypeIds: ($s | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0)))}')
          OUT=$(bun run internal-request -- --path /internal/cron/import/surcharges/eu-remedies --body "$BODY")
          echo "$OUT" | jq .
          ROWS=$(echo "$OUT" | jq -r '([.count,.inserted,.updated] | map(select(type=="number")) | add) // 0')
          if [ "$ROWS" -lt 1 ]; then
            echo "[surcharges:eu-remedies] expected >0 imported rows, got $ROWS"
            exit 1
          fi

      - name: US Surcharges — all
        run: .github/scripts/cron-import-step.sh "surcharges:us-all" /internal/cron/import/surcharges/us-all '{}'

      # ── De Minimis ──────────────────────────────────────────────────────
      - name: De Minimis — official
        run: .github/scripts/cron-import-step.sh "de-minimis:official" /internal/cron/de-minimis/import-official '{}'

      - name: De Minimis — Zonos
        run: .github/scripts/cron-import-step.sh "de-minimis:zonos" /internal/cron/de-minimis/import-zonos '{}'

      # ── Notices ──────────────────────────────────────────────────────────
      - name: Notices — CN (MOF)
        run: |
          bun run internal-request -- --path /internal/cron/notices/cn/mof --body '{}' | jq .

      - name: Notices — CN (GACC)
        run: |
          bun run internal-request -- --path /internal/cron/notices/cn/gacc --body '{}' | jq .

      - name: Notices — CN (MOFCOM)
        run: |
          bun run internal-request -- --path /internal/cron/notices/cn/mofcom --body '{}' | jq .

      # ── Maintenance ─────────────────────────────────────────────────────
      - name: Prune old imports & provenance
        run: |
          BODY="{\"days\": ${PRUNE_DAYS}}"
          bun run internal-request -- --path /internal/cron/imports/prune --body "$BODY" | jq .

      # ── Notifications ───────────────────────────────────────────────────
      - name: Slack (success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            line1="✅ ${{ github.workflow }} succeeded in ${{ github.repository }} on \`${{ github.ref_name }}\`"
            payload=$(jq -n --arg line1 "$line1" --arg run "$RUN_URL" '{text: ($line1 + "\n" + $run)}')
            curl -fsS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
          fi

      - name: Slack (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            line1="🚨 ${{ github.workflow }} failed in ${{ github.repository }} on \`${{ github.ref_name }}\`"
            payload=$(jq -n --arg line1 "$line1" --arg run "$RUN_URL" '{text: ($line1 + "\n" + $run)}')
            curl -fsS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"
          fi

      - name: Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            content="✅ **${{ github.workflow }}** succeeded in **${{ github.repository }}** on \`${{ github.ref_name }}\`\n${RUN_URL}"
            payload=$(jq -n --arg content "$content" '{content: $content}')
            curl -fsS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK_URL"
          fi

      - name: Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            content="🚨 **${{ github.workflow }}** failed in **${{ github.repository }}** on \`${{ github.ref_name }}\`\n${RUN_URL}"
            payload=$(jq -n --arg content "$content" '{content: $content}')
            curl -fsS -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK_URL"
          fi
